const SK = "dpr_mew5991_v6";
const todayStr = () => new Date().toISOString().split("T")[0];
const AMBER="#F5A623", GREEN="#3fb950", YELLOW="#f0c040";

const mono = '"Courier New", monospace';

function countDone(item, key, daily) {
  return new Set([...(BG_DONE[item][key]||[]), ...(daily[item][key]?.done||[])]).size;
}

function Chip({ loc, status, onToggle, onRemove }) {
  const s = {
    [IP]:   {bg:"#2e2200",fg:YELLOW,border:"#6b4f00",icon:"▶"},
    [DONE]: {bg:"#0a2410",fg:GREEN, border:"#155a25",icon:"✓"},
    none:   {bg:"#1a1a1a",fg:"#666",border:"#2a2a2a",icon:""},
  }[status||"none"];
  return (
    <div style={{position:"relative",display:"inline-flex",margin:"3px"}}>
      <button onClick={onToggle} style={{
        background:s.bg, color:s.fg, border:`1.5px solid ${s.border}`,
        borderRadius:7, padding:"6px 10px", cursor:"pointer",
        fontFamily:mono, fontSize:12, fontWeight:700,
        display:"flex", alignItems:"center", gap:5,
        boxShadow:status?`0 0 8px ${s.border}88`:"none",
        transition:"all 0.12s", userSelect:"none",
      }}>
        {s.icon && <span style={{fontSize:10}}>{s.icon}</span>}
        {loc}
      </button>
      <button onClick={onRemove} style={{
        position:"absolute", top:-6, right:-6,
        width:16, height:16, borderRadius:"50%",
        background:"#2a2a2a", border:"1px solid #444",
        color:"#888", fontSize:9, cursor:"pointer",
        display:"flex", alignItems:"center", justifyContent:"center",
        padding:0, lineHeight:1,
      }}>✕</button>
    </div>
  );
}

function App() {
  const emptyDaily = () => {
    const d = {item1:{}, item2:{}};
    ["item1","item2"].forEach(it => ACTS.forEach(a => { d[it][a.key] = {done:[],ip:[]}; }));
    return d;
  };

  const [daily, setDaily]   = useState(null);
  const [tab, setTab]       = useState("item1");
  const [date, setDate]     = useState(todayStr());
  const [weather, setWeather] = useState("Sunny");
  const [temp, setTemp]     = useState("32°C / 46°C");
  const [inputs, setInputs] = useState({});
  const [errors, setErrors] = useState({});
  const [toast, setToast]   = useState("");
  const refs = useRef({});

  useEffect(() => {
    try {
      const raw = localStorage.getItem(SK);
      setDaily(raw ? JSON.parse(raw) : emptyDaily());
    } catch { setDaily(emptyDaily()); }
  }, []);

  function persist(next) {
    setDaily(next);
    try { localStorage.setItem(SK, JSON.stringify(next)); } catch {}
  }

  function flash(msg) { setToast(msg); setTimeout(()=>setToast(""), 2200); }

  function chips(item, key) {
    const d = daily[item][key];
    const all = [...new Set([...d.done,...d.ip])];
    return all.sort((a,b) => ALL_TOWERS[item].indexOf(a) - ALL_TOWERS[item].indexOf(b));
  }

  function chipStatus(item, key, loc) {
    if (daily[item][key].done.includes(loc)) return DONE;
    if (daily[item][key].ip.includes(loc))   return IP;
    return null;
  }

  function toggle(item, key, loc) {
    const cur = chipStatus(item, key, loc);
    const d = daily[item][key];
    let nd = [...d.done], ni = [...d.ip];
    if (cur===DONE)    { nd=nd.filter(x=>x!==loc); ni.push(loc); }
    else if (cur===IP) { ni=ni.filter(x=>x!==loc); nd.push(loc); }
    else               { nd.push(loc); }
    persist({...daily,[item]:{...daily[item],[key]:{done:nd,ip:ni}}});
  }

  function remove(item, key, loc) {
    const d = daily[item][key];
    persist({...daily,[item]:{...daily[item],[key]:{
      done:d.done.filter(x=>x!==loc), ip:d.ip.filter(x=>x!==loc),
    }}});
  }

  function addChips(item, key, startAs) {
    const raw = (inputs[`${item}_${key}`]||"").trim();
    if (!raw) return;
    const tokens = raw.split(/[,\s;]+/).map(s=>s.trim()).filter(Boolean);
    const vs = new Set(ALL_TOWERS[item]);
    const valid   = tokens.filter(t=>vs.has(t));
    const invalid = tokens.filter(t=>!vs.has(t));
    if (invalid.length) {
      setErrors(e=>({...e,[`${item}_${key}`]:`Not found: ${invalid.join(", ")}`}));
      setTimeout(()=>setErrors(e=>{const n={...e};delete n[`${item}_${key}`];return n;}),3500);
    }
    if (!valid.length) return;
    const d = daily[item][key];
    const existing = new Set([...d.done,...d.ip]);
    const toAdd = valid.filter(t=>!existing.has(t));
    if (!toAdd.length) { flash("All entered towers already added"); return; }
    const updated = {
      done: startAs===DONE ? [...d.done,...toAdd] : [...d.done],
      ip:   startAs===IP   ? [...d.ip,...toAdd]   : [...d.ip],
    };
    persist({...daily,[item]:{...daily[item],[key]:updated}});
    setInputs(q=>({...q,[`${item}_${key}`]:""}));
    flash(`${toAdd.length} tower${toAdd.length>1?"s":""} added — tap chip to change status`);
    refs.current[`${item}_${key}`]?.focus();
  }

  function downloadExcel() {
    if (!daily) return;
    const wb = XLSX.utils.book_new();
    ["item1","item2"].forEach(item => {
      const towers = ALL_TOWERS[item];
      const label = item==="item1"
        ? "Item 1 – Khiran P/Stn to Wafra 'Z' SS"
        : "Item 2 – Wafra 'Z' S/Stn to Sulaibiya 'Z' S/Stn";
      const dataRows = ACTS.map((act,i) => {
        const bgD = new Set(BG_DONE[item][act.key]||[]);
        const dyD = new Set(daily[item][act.key].done);
        const dyI = new Set(daily[item][act.key].ip);
        return [i+1, act.name, ...towers.map(t=>
          dyD.has(t)||bgD.has(t)?"✓": dyI.has(t)?"▶":""
        )];
      });
      const totRow=["","TOTAL DONE →",...towers.map((_,ci)=>dataRows.reduce((s,r)=>s+(r[ci+2]==="✓"?1:0),0))];
      const ipRow =["","IN PROGRESS →",...towers.map((_,ci)=>dataRows.reduce((s,r)=>s+(r[ci+2]==="▶"?1:0),0))];
      const aoa = [[`MEW-5991 | ${label} | As on ${date}`],["#","Activity",...towers],...dataRows,totRow,ipRow];
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      ws["!cols"]=[{wch:4},{wch:30},...towers.map(()=>({wch:7}))];
      XLSX.utils.book_append_sheet(wb, ws, item==="item1"?"Item 1":"Item 2");
    });
    const out = XLSX.write(wb,{bookType:"xlsx",type:"array"});
    const url = URL.createObjectURL(new Blob([out],{type:"application/octet-stream"}));
    Object.assign(document.createElement("a"),{href:url,download:`DPR-MEW5991-${date}.xlsx`}).click();
    URL.revokeObjectURL(url);
    flash("📥 Excel downloaded!");
  }

  function downloadPNG() {
    if (!daily) return;
    const W=880,PAD=22,rowH=44,hH=28,sH=32;
    const H=72+2*(sH+hH+ACTS.length*rowH+12)+34;
    const cv=document.createElement("canvas");
    cv.width=W; cv.height=H;
    const g=cv.getContext("2d");
    g.fillStyle=BG; g.fillRect(0,0,W,H);
    g.fillStyle=AMBER; g.fillRect(0,0,W,60);
    g.fillStyle="#000"; g.font=`bold 19px sans-serif`; g.textAlign="left";
    g.fillText("DAILY PROGRESS REPORT  ·  MEW/C/5991",PAD,26);
    g.font=`11px sans-serif`;
    g.fillText(`${date}  ·  ${weather}  ·  ${temp}  ·  L&T Construction  ·  400kV OHL Kuwait`,PAD,46);
    let y=68;
    ["item1","item2"].forEach(item=>{
      const towers=ALL_TOWERS[item], total=towers.length;
      const label=item==="item1"?"ITEM 1 – Khiran P/Stn → Wafra 'Z' SS":"ITEM 2 – Wafra 'Z' S/Stn → Sulaibiya 'Z' S/Stn";
      g.fillStyle=NAVY; g.fillRect(PAD,y,W-PAD*2,sH);
      g.fillStyle=AMBER; g.font=`bold 12px sans-serif`; g.textAlign="left";
      g.fillText(`${label}  (${total} towers)`,PAD+10,y+21); y+=sH;
      const cols=["Activity","Done","In Prog","Remaining","% Complete","Progress"];
      const cw=[230,62,72,80,82,W-PAD*2-230-62-72-80-82];
      g.fillStyle="#191919"; g.fillRect(PAD,y,W-PAD*2,hH);
      let x=PAD;
      cols.forEach((c,i)=>{
        g.fillStyle="#555"; g.font=`bold 9px sans-serif`;
        g.textAlign=i===0?"left":"center";
        g.fillText(c,i===0?x+8:x+cw[i]/2,y+19); x+=cw[i];
      }); y+=hH;
      ACTS.forEach((act,ai)=>{
        const bgD=new Set(BG_DONE[item][act.key]||[]);
        const dyD=new Set(daily[item][act.key].done);
        const dyI=new Set(daily[item][act.key].ip);
        const done=new Set([...bgD,...dyD]).size;
        const ip=[...dyI].filter(t=>!bgD.has(t)&&!dyD.has(t)).length;
        const pct=total>0?done/total*100:0;
        g.fillStyle=ai%2===0?CARD:"#111"; g.fillRect(PAD,y,W-PAD*2,rowH);
        x=PAD;
        g.fillStyle=TEXT; g.font=`11px sans-serif`; g.textAlign="left";
        g.fillText(act.name,x+8,y+26); x+=cw[0];
        g.fillStyle=GREEN; g.font=`bold 13px monospace`; g.textAlign="center";
        g.fillText(String(done),x+cw[1]/2,y+26); x+=cw[1];
        g.fillStyle=ip>0?YELLOW:"#333"; g.font=ip>0?`bold 13px monospace`:`12px monospace`;
        g.fillText(ip>0?`▶ ${ip}`:"–",x+cw[2]/2,y+26); x+=cw[2];
        g.fillStyle="#555"; g.font=`12px monospace`;
        g.fillText(String(total-done-ip),x+cw[3]/2,y+26); x+=cw[3];
        const pc=pct>=90?GREEN:pct>=50?AMBER:"#888";
        g.fillStyle=pc; g.font=`bold 13px sans-serif`;
        g.fillText(`${pct.toFixed(1)}%`,x+cw[4]/2,y+26); x+=cw[4];
        const bw=cw[5]-16,bh=9,bx=x+8,by=y+(rowH-bh)/2;
        g.fillStyle="#252525"; g.fillRect(bx,by,bw,bh);
        const dw=Math.round(bw*Math.min(pct/100,1));
        if(dw>0){g.fillStyle=pct>=90?GREEN:pct>=50?AMBER:NAVY; g.fillRect(bx,by,dw,bh);}
        const iw=Math.round(bw*Math.min(ip/total,1));
        if(iw>0){g.fillStyle=YELLOW; g.fillRect(bx+dw,by,iw,bh);}
        y+=rowH;
      }); y+=12;
    });
    g.fillStyle="#111"; g.fillRect(0,H-32,W,32);
    g.fillStyle="#444"; g.font=`10px sans-serif`; g.textAlign="center";
    g.fillText("Prepared by: Murshid (Asst. Mgr – Electrical)  ·  MEW/C/5991-2023/2024  ·  L&T Construction",W/2,H-11);
    cv.toBlob(b=>{
      const url=URL.createObjectURL(b);
      Object.assign(document.createElement("a"),{href:url,download:`DPR-${date}.png`}).click();
      URL.revokeObjectURL(url);
    });
    flash("🖼️ PNG downloaded!");
  }

  if (!daily) return (
    <div style={{background:BG,height:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{color:AMBER,fontFamily:mono}}>Loading…</div>
    </div>
  );

  return (
    <div style={{background:BG,minHeight:"100vh",fontFamily:"'Segoe UI',system-ui,sans-serif",color:TEXT}}>

      {toast && (
        <div style={{position:"fixed",top:14,right:14,background:AMBER,color:"#000",
          padding:"9px 16px",borderRadius:8,fontWeight:700,fontSize:12,zIndex:999}}>
          {toast}
        </div>
      )}

      {/* Header */}
      <div style={{background:AMBER,padding:"10px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div>
          <div style={{fontFamily:mono,fontWeight:700,fontSize:15,color:"#000"}}>MEW-5991 · DPR</div>
          <div style={{fontSize:10,color:"#444"}}>400kV OHL Kuwait · L&T Construction</div>
        </div>
        <div style={{display:"flex",gap:7,flexWrap:"wrap",alignItems:"center"}}>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)}
            style={{background:"#000",border:"none",color:AMBER,fontFamily:mono,fontSize:12,padding:"5px 8px",borderRadius:5}}/>
          <select value={weather} onChange={e=>setWeather(e.target.value)}
            style={{background:"#000",border:"none",color:TEXT,fontSize:12,padding:"5px 8px",borderRadius:5}}>
            {["Sunny","Partly Cloudy","Cloudy","Windy","Sandstorm"].map(w=><option key={w}>{w}</option>)}
          </select>
          <input value={temp} onChange={e=>setTemp(e.target.value)}
            style={{background:"#000",border:"none",color:TEXT,fontFamily:mono,fontSize:12,padding:"5px 8px",borderRadius:5,width:96}}/>
          <button onClick={downloadExcel}
            style={{background:NAVY,color:"#fff",border:"none",borderRadius:5,padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>
            ⬇ Excel
          </button>
          <button onClick={downloadPNG}
            style={{background:"#111",color:AMBER,border:`1px solid ${AMBER}`,borderRadius:5,padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>
            🖼 PNG
          </button>
        </div>
      </div>

      {/* Legend */}
      <div style={{background:"#0e0e0e",padding:"7px 18px",borderBottom:`1px solid ${BORDER}`,display:"flex",gap:18,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{fontSize:10,color:MUTED,fontWeight:600,letterSpacing:1}}>CHIP STATUS:</span>
        <div style={{display:"flex",gap:5,alignItems:"center"}}>
          <span style={{background:"#2e2200",color:YELLOW,border:`1.5px solid #6b4f00`,borderRadius:5,padding:"3px 9px",fontSize:11,fontFamily:mono,fontWeight:700}}>▶ 8/1</span>
          <span style={{fontSize:10,color:YELLOW}}>In Progress</span>
        </div>
        <div style={{display:"flex",gap:5,alignItems:"center"}}>
          <span style={{background:"#0a2410",color:GREEN,border:`1.5px solid #155a25`,borderRadius:5,padding:"3px 9px",fontSize:11,fontFamily:mono,fontWeight:700}}>✓ 8/1</span>
          <span style={{fontSize:10,color:GREEN}}>Completed</span>
        </div>
        <span style={{fontSize:10,color:MUTED}}>· Tap chip to toggle · ✕ to remove · Pre-seeded data in Excel only</span>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",background:CARD,borderBottom:`1px solid ${BORDER}`}}>
        {[["item1","Item 1 – Khiran → Wafra 'Z'  (128)"],["item2","Item 2 – Wafra 'Z' → Sulaibiya 'Z'  (229)"]].map(([key,lbl])=>(
          <button key={key} onClick={()=>setTab(key)}
            style={{padding:"10px 16px",background:"none",border:"none",cursor:"pointer",
              fontSize:13,fontWeight:tab===key?700:400,
              color:tab===key?AMBER:MUTED,
              borderBottom:tab===key?`2px solid ${AMBER}`:"2px solid transparent",marginBottom:-1}}>
            {lbl}
          </button>
        ))}
      </div>

      {/* Activity rows */}
      {ACTS.map((act,ai)=>{
        const total=ALL_TOWERS[tab].length;
        const done=countDone(tab,act.key,daily);
        const ip=daily[tab][act.key].ip.length;
        const pct=(done/total*100).toFixed(1);
        const ik=`${tab}_${act.key}`;
        const todayChips=chips(tab,act.key);

        return (
          <div key={act.key} style={{borderBottom:`1px solid ${BORDER}`,background:ai%2===0?CARD:"#0f0f0f"}}>
            <div style={{padding:"12px 18px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10,flexWrap:"wrap",gap:8}}>
                <div>
                  <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>{act.name}</div>
                  <div style={{display:"flex",gap:12,alignItems:"center"}}>
                    <span style={{fontSize:11,color:GREEN}}>✓ {done} done</span>
                    {ip>0&&<span style={{fontSize:11,color:YELLOW}}>▶ {ip} in progress</span>}
                    <span style={{fontSize:11,color:MUTED}}>{total-done-ip} remaining</span>
                    <span style={{fontSize:12,fontWeight:700,color:pct>=90?GREEN:pct>=50?AMBER:MUTED}}>{pct}%</span>
                  </div>
                </div>
                <div style={{width:140,background:"#252525",borderRadius:4,height:7,overflow:"hidden",display:"flex",alignSelf:"center"}}>
                  <div style={{width:`${done/total*100}%`,background:pct>=90?GREEN:pct>=50?AMBER:NAVY,transition:"width .3s"}}/>
                  <div style={{width:`${ip/total*100}%`,background:YELLOW,transition:"width .3s"}}/>
                </div>
              </div>

              <div style={{display:"flex",gap:6,marginBottom:todayChips.length?10:0}}>
                <input
                  ref={el=>refs.current[ik]=el}
                  value={inputs[ik]||""}
                  onChange={e=>setInputs(q=>({...q,[ik]:e.target.value}))}
                  onKeyDown={e=>e.key==="Enter"&&addChips(tab,act.key,IP)}
                  placeholder={`Type tower nos  e.g. 7/5, 7/6, 7/7`}
                  style={{flex:1,background:"#181818",border:`1px solid ${errors[ik]?"#f85149":BORDER}`,
                    color:TEXT,fontFamily:mono,fontSize:12,padding:"7px 10px",borderRadius:6,outline:"none"}}
                />
                <button onClick={()=>addChips(tab,act.key,IP)} title="Add as In Progress"
                  style={{background:"#2e2200",color:YELLOW,border:`1px solid #6b4f00`,borderRadius:6,padding:"7px 13px",cursor:"pointer",fontWeight:700,fontSize:12}}>
                  ▶ Add
                </button>
                <button onClick={()=>addChips(tab,act.key,DONE)} title="Add as Completed"
                  style={{background:"#0a2410",color:GREEN,border:`1px solid #155a25`,borderRadius:6,padding:"7px 13px",cursor:"pointer",fontWeight:700,fontSize:12}}>
                  ✓ Done
                </button>
              </div>

              {errors[ik]&&<div style={{color:"#f85149",fontSize:10,marginBottom:6,fontFamily:mono}}>{errors[ik]}</div>}

              {todayChips.length>0&&(
                <div style={{display:"flex",flexWrap:"wrap",marginTop:2}}>
                  {todayChips.map(loc=>(
                    <Chip key={loc} loc={loc} status={chipStatus(tab,act.key,loc)}
                      onToggle={()=>toggle(tab,act.key,loc)}
                      onRemove={()=>remove(tab,act.key,loc)}/>
                  ))}
                </div>
              )}
            </div>
          </div>
        );
      })}
      <div style={{height:40}}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
